<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ROCO'S Time</title>
  <meta name="theme-color" content="#236b48">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ROCO'S Time">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.svg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="cloud-config.js"></script>
  <style>
    :root {
      --bg: #f5f7f6;
      --panel: #fff;
      --ink: #202520;
      --muted: #66736c;
      --line: #d8dfda;
      --green: #236b48;
      --green-soft: #e5f2eb;
      --blue: #2d638d;
      --blue-soft: #e6eef7;
      --red: #9b423b;
      --red-soft: #f8e8e6;
      --amber: #8a6425;
      --amber-soft: #f5eddb;
      --shadow: 0 14px 34px rgba(31, 38, 34, .08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Yu Gothic", "Meiryo", system-ui, sans-serif;
      line-height: 1.5;
    }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; border: 1px solid transparent; }

    .login-screen {
      align-items: center;
      background: var(--bg);
      display: grid;
      inset: 0;
      padding: 18px;
      position: fixed;
      z-index: 30;
    }
    .login-screen[hidden] { display: none; }
    .login-box {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 14px;
      margin: auto;
      max-width: 430px;
      padding: 22px;
      width: 100%;
    }
    .login-box label {
      color: var(--muted);
      display: grid;
      font-weight: 800;
      gap: 6px;
    }
    .login-box input {
      background: #fff;
      border: 2px solid var(--line);
      border-radius: 8px;
      color: var(--ink);
      min-height: 52px;
      padding: 8px 10px;
    }
    #loginMessage {
      color: var(--red);
      font-weight: 800;
      min-height: 22px;
    }
    body.punch-only .tabs,
    body.punch-only header .row {
      display: none;
    }

    .app {
      width: min(1220px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 46px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 18px;
      margin-bottom: 18px;
    }
    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 48px);
      letter-spacing: 0;
    }
    h2, h3 { margin: 0 0 12px; }
    .lead {
      margin: 6px 0 0;
      color: var(--muted);
    }
    .tabs, .subtabs {
      display: flex;
      gap: 8px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .tab, .subtab {
      min-height: 52px;
      border-radius: 8px 8px 0 0;
      padding: 0 18px;
      background: transparent;
      border-color: transparent;
      color: var(--muted);
      font-weight: 700;
      font-size: 17px;
    }
    .tab.active, .subtab.active {
      background: var(--panel);
      border-color: var(--line);
      border-bottom-color: var(--panel);
      color: var(--green);
      transform: translateY(1px);
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }
    .hidden { display: none !important; }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-items: start;
    }
    .three {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }
    .wide-field {
      grid-column: 1 / -1;
    }
    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }
    label {
      font-size: 13px;
      font-weight: 700;
      color: #3f4843;
    }
    input, select, textarea {
      width: 100%;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 10px;
      background: #fff;
      color: var(--ink);
    }
    textarea {
      min-height: 120px;
      resize: vertical;
    }
    input:focus, select:focus, textarea:focus {
      outline: 3px solid rgba(35, 107, 72, .18);
      border-color: var(--green);
    }
    .unit-input {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      overflow: hidden;
    }
    .unit-input input {
      border: 0;
      border-radius: 0;
    }
    .unit-input span {
      padding: 0 12px;
      color: var(--muted);
      font-weight: 700;
    }
    .clock {
      text-align: center;
      padding: 22px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      margin-bottom: 16px;
    }
    .clock-date { color: var(--muted); font-weight: 700; }
    .clock-time {
      font-size: clamp(44px, 10vw, 82px);
      font-weight: 800;
      line-height: 1.1;
      font-variant-numeric: tabular-nums;
    }
    .punch-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .punch-btn {
      min-height: 112px;
      border-radius: 8px;
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 800;
    }
    .punch-in { background: var(--green); border-color: var(--green); color: #fff; }
    .punch-out { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn {
      min-height: 42px;
      border-radius: 8px;
      padding: 0 14px;
      background: #fff;
      border-color: var(--line);
      color: var(--ink);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }
    .btn.primary { background: var(--green); border-color: var(--green); color: #fff; }
    .btn.danger { color: var(--red); }
    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .notice {
      min-height: 24px;
      margin-top: 12px;
      color: var(--green);
      font-weight: 700;
    }
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 88px;
      background: #fbfcfb;
    }
    .metric span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 22px;
      word-break: break-word;
    }
    .metric.green { background: var(--green-soft); border-color: #b9d8c3; }
    .metric.blue { background: var(--blue-soft); border-color: #bfd1e7; }
    .metric.amber { background: var(--amber-soft); border-color: #e4cf9e; }
    .metric.red { background: var(--red-soft); border-color: #ead0cc; }
    .pay-hero {
      border: 2px solid var(--green);
      border-radius: 8px;
      background: var(--green-soft);
      padding: 16px;
      margin: 14px 0;
    }
    .pay-hero span {
      display: block;
      color: var(--muted);
      font-weight: 700;
      font-size: 13px;
    }
    .pay-hero strong {
      display: block;
      margin-top: 4px;
      font-size: clamp(32px, 6vw, 46px);
      line-height: 1.1;
      color: var(--green);
      font-variant-numeric: tabular-nums;
    }
    .payslip-top {
      display: grid;
      grid-template-columns: 1fr minmax(260px, auto);
      gap: 14px;
      align-items: stretch;
      margin-bottom: 12px;
    }
    .payslip-person {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      background: #fff;
    }
    .payslip-person h2 {
      margin: 0 0 10px;
      font-size: 22px;
    }
    .payslip-person strong {
      display: block;
      font-size: clamp(30px, 5vw, 44px);
      line-height: 1.05;
      word-break: break-word;
    }
    .payslip-net {
      margin: 0;
      text-align: right;
      display: grid;
      align-content: center;
    }
    .payslip-section-row th,
    .payslip-section-row td {
      background: #eef2eb;
      color: #334139;
      font-weight: 800;
      text-align: left;
    }
    .payslip-total-row th,
    .payslip-total-row td {
      font-weight: 800;
      background: #f7faf8;
    }
    .payslip-net-row th,
    .payslip-net-row td {
      background: var(--green-soft);
      border-top: 2px solid var(--green);
      border-bottom: 2px solid var(--green);
      font-weight: 900;
      font-size: 1.18em;
    }
    .payslip-leave-row th,
    .payslip-leave-row td {
      border-top: 8px solid #fff;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px;
      text-align: left;
      vertical-align: middle;
      word-break: break-word;
    }
    th {
      background: #eef2eb;
      color: #414a3f;
      font-size: 12px;
    }
    tr:last-child td { border-bottom: 0; }
    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .calendar {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }
    .day-name {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      padding: 8px 0;
    }
    .day-card {
      min-height: 178px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      display: grid;
      align-content: start;
      gap: 8px;
    }
    .day-card.muted { opacity: .42; }
    .day-number {
      font-weight: 800;
      color: var(--green);
      font-size: 20px;
    }
    .shift-chip {
      border: 0;
      border-radius: 8px;
      padding: 7px 8px;
      background: var(--green-soft);
      color: var(--ink);
      cursor: pointer;
      font-size: 13px;
      font: inherit;
      font-weight: 700;
      line-height: 1.35;
      text-align: left;
    }
    .shift-chip.open {
      background: var(--red-soft);
      color: var(--red);
      font-weight: 700;
    }
    .employee-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }
    .employee-item {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) auto auto max-content;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      background: #fbfcfb;
    }
    .punch-record-actions {
      display: flex;
      gap: 6px;
      justify-content: flex-end;
    }
    .document {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      min-height: 520px;
    }
    .document h2 { text-align: center; margin-bottom: 22px; }
    .document p { margin: 10px 0; }
    .profile-head {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 18px;
      align-items: start;
      margin-bottom: 18px;
    }
    .profile-photo {
      width: 140px;
      aspect-ratio: 3 / 4;
      border: 1px solid var(--line);
      border-radius: 8px;
      object-fit: cover;
      background: #f3f5f3;
    }
    .profile-photo.empty-photo {
      display: grid;
      place-items: center;
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      padding: 8px;
    }
    .contract-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 18px;
    }
    .contract-grid p {
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
    }
    .insurance-row {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin: 10px 0;
    }
    .insurance-row p {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px;
      margin: 0;
    }
    .signature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 16px;
    }
    .signature-box {
      border: 1px solid var(--ink);
      border-radius: 8px;
      padding: 12px;
      min-height: 150px;
    }
    .signature-box h3 {
      margin: 0 0 10px;
      font-size: 18px;
    }
    .yn-group {
      display: flex;
      gap: 6px;
    }
    .yn-btn {
      min-height: 38px;
      min-width: 58px;
      border-radius: 8px;
      border-color: var(--line);
      background: #fff;
      font-weight: 700;
    }
    .yn-btn.active {
      background: var(--green);
      color: #fff;
      border-color: var(--green);
    }
    .small-note {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }
    .empty {
      padding: 30px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fbfcfb;
    }
    .small-actions {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }
    .icon-btn {
      min-width: 34px;
      height: 34px;
      padding: 0 10px;
      border-radius: 8px;
      border-color: var(--line);
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }
    .icon-btn.danger {
      border-color: #e2c3be;
      color: var(--red);
    }

    @media (max-width: 980px) {
      header, .grid, .three, .summary-grid {
        grid-template-columns: 1fr;
      }
      header { align-items: flex-start; }
      table { min-width: 980px; }
      .table-wrap { overflow-x: auto; }
      .calendar { grid-template-columns: 1fr; }
      .day-name { display: none; }
      .employee-item { grid-template-columns: 1fr; }
    }
    @media (max-width: 560px) {
      .app { width: min(100% - 18px, 1220px); }
      .punch-actions { grid-template-columns: 1fr; }
      .tab, .subtab { flex: 1; padding: 0 10px; }
    }
    @media print {
      @page {
        size: A4 portrait;
        margin: 8mm;
      }
      @page monthlyLandscape {
        size: A4 landscape;
        margin: 8mm;
      }
      @page payslipLandscape {
        size: A4 landscape;
        margin: 8mm;
      }
      body.print-monthly {
        page: monthlyLandscape;
      }
      body.print-payslip {
        page: payslipLandscape;
      }
      body { background: #fff; }
      header, .tabs, .subtabs, .no-print { display: none !important; }
      .app { width: 100%; padding: 0; }
      .panel { box-shadow: none; border: 0; }
      table { min-width: 0; font-size: 11px; }
      th, td { padding: 6px; }
      .document { border: 0; }
      body.print-employee-card main > *:not(#printOnlyEmployeeCard),
      body.print-contract main > *:not(#printOnlyContract),
      body.print-payslip main > *:not(#printOnlyPayslip) { display: none !important; }
      #printOnlyEmployeeCard, #printOnlyContract, #printOnlyPayslip { display: block !important; }
      body.print-employee-card .document,
      body.print-contract .document {
        page-break-after: avoid;
        page-break-before: avoid;
        width: 194mm;
        min-height: 281mm;
        max-height: 281mm;
        overflow: hidden;
        font-size: 10px;
        line-height: 1.22;
        padding: 0;
      }
      body.print-contract .document {
        font-size: 8.4px;
        line-height: 1.08;
      }
      body.print-contract .contract-grid {
        grid-template-columns: 1fr 1fr;
        gap: 2px 8px;
      }
      body.print-contract .contract-grid p,
      body.print-employee-card .contract-grid p { margin: 2px 0; padding-bottom: 2px; }
      body.print-contract .document h2,
      body.print-employee-card .document h2 { margin-bottom: 6px; font-size: 17px; }
      body.print-contract .document p { margin: 3px 0; }
      body.print-contract .insurance-row {
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
        margin: 4px 0;
      }
      body.print-contract .insurance-row p {
        padding: 4px;
        border-radius: 4px;
      }
      body.print-contract .signature-grid {
        gap: 8px;
        margin-top: 6px;
      }
      body.print-contract .signature-box {
        min-height: 76px;
        padding: 6px;
        border-radius: 4px;
      }
      body.print-contract .signature-box h3 {
        font-size: 13px;
        margin-bottom: 4px;
      }
      body.print-employee-card .profile-head {
        grid-template-columns: 120px 1fr;
        gap: 12px;
        margin-bottom: 8px;
      }
      body.print-employee-card .profile-photo {
        width: 120px;
      }
      body.print-employee-card .contract-grid {
        grid-template-columns: 1fr 1fr;
        gap: 3px 12px;
      }
      body.print-employee-card .wide-print {
        grid-column: 1 / -1;
      }
      body.print-employee-card h3 { margin: 8px 0 4px; }
      body.print-employee-card .profile-name {
        font-size: 14px;
      }
      body.print-payslip .panel {
        padding: 0;
      }
      #printOnlyPayslip {
        width: 281mm;
      }
      body.print-payslip .payslip-sheet {
        display: flex;
        flex-wrap: wrap;
        gap: 3mm;
        align-items: flex-start;
      }
      body.print-payslip .payslip-card {
        width: calc(50% - 1.5mm);
        min-height: 0;
        max-height: 185mm;
        overflow: hidden;
        page-break-inside: avoid;
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 2.5mm;
        font-size: 6.7px;
        line-height: 1.05;
      }
      body.print-payslip .payslip-card:nth-child(2n):not(:last-child) {
        page-break-after: always;
      }
      body.print-payslip .pay-hero {
        margin: 0;
        padding: 4px;
        min-width: 34mm;
      }
      body.print-payslip .pay-hero strong {
        font-size: 16px;
      }
      body.print-payslip .payslip-top {
        grid-template-columns: 1fr 34mm;
        gap: 2mm;
        margin-bottom: 2px;
      }
      body.print-payslip .payslip-person {
        padding: 4px;
      }
      body.print-payslip .payslip-person h2 {
        font-size: 10px;
        margin-bottom: 2px;
      }
      body.print-payslip .payslip-person strong {
        font-size: 18px;
      }
      body.print-payslip .summary-grid {
        grid-template-columns: repeat(4, 1fr);
        gap: 2px;
        margin-bottom: 3px;
      }
      body.print-payslip .metric {
        min-height: 25px;
        padding: 3px;
      }
      body.print-payslip .metric span {
        font-size: 6px;
      }
      body.print-payslip .metric strong {
        font-size: 9px;
        margin-top: 1px;
      }
      body.print-payslip table {
        font-size: 6.5px;
      }
      body.print-payslip th,
      body.print-payslip td {
        padding: 1px 2px;
      }
      body.print-payslip h2,
      body.print-payslip h3,
      body.print-payslip p {
        margin-top: 1px;
        margin-bottom: 1px;
      }
      body.print-payslip .shift-chip,
      body.print-payslip .empty {
        padding: 2px;
      }
      body.print-monthly {
        width: 281mm;
      }
      body.print-monthly table {
        font-size: 8px;
      }
      body.print-monthly th,
      body.print-monthly td {
        padding: 3px;
      }
    }
  </style>
</head>
<body>
  <div class="login-screen" id="loginScreen" hidden>
    <form class="login-box" id="loginForm">
      <h1>ROCO'S Time</h1>
      <p class="lead">iPadとパソコンで同じ勤務データを使います。</p>
      <label>
        メールアドレス
        <input id="loginEmail" type="email" autocomplete="username" required>
      </label>
      <label>
        パスワード
        <input id="loginPassword" type="password" autocomplete="current-password" required>
      </label>
      <button class="btn primary" type="submit">ログイン</button>
      <p id="loginMessage"></p>
    </form>
  </div>
  <main class="app">
    <header>
      <div>
        <h1>ROCO'S Time</h1>
        <p class="lead">打刻、勤務確認、従業員名簿、雇用契約書、給料明細、税理士提出データをまとめます。</p>
      </div>
      <div class="row no-print">
        <button class="btn" id="cloudSyncStatus" type="button">端末保存</button>
        <button class="btn" id="logoutButton" type="button" hidden>ログアウト</button>
        <button class="btn" id="backupJson" type="button">バックアップ</button>
        <label class="btn" for="restoreJson">復元</label>
        <input id="restoreJson" type="file" accept="application/json" hidden>
      </div>
    </header>

    <nav class="tabs no-print" aria-label="画面切替">

    function loadState() {
      const saved = localStorage.getItem(storageKey) || localStorage.getItem(oldStorageKey);

        try {
          const parsed = JSON.parse(saved);
          return normalizeState(parsed);
        } catch {}
      }
      return normalizeState({
        employees: [
          { id: crypto.randomUUID(), name: "職員A", wage: 1100 },
          { id: crypto.randomUUID(), name: "職員B", wage: 1100 }
        ],
        shifts: [],

    function normalizeState(raw) {
      const employees = (raw.employees || []).map((employee) => ({
        id: employee.id || crypto.randomUUID(),
        name: employee.name || "未設定",
        furigana: employee.furigana || "",
        gender: employee.gender || "",
        photo: employee.photo || "",
        birthDate: employee.birthDate || "",
        domicile: employee.domicile || "",
        currentAddress: employee.currentAddress || "",
        phoneNumber: employee.phoneNumber || "",
        spouse: employee.spouse || "",
        dependents: employee.dependents || "",
        emergencyContactName: employee.emergencyContactName || employee.emergencyContact || "",
        emergencyContactPhone: employee.emergencyContactPhone || "",
        qualification: employee.qualification || "",
        wage: Number(employee.wage || employee.hourlyWage || 0),
        jobAllowance: Number(employee.jobAllowance || 0),
        hireDate: employee.hireDate || todayText(),
        position: employee.position || "",
        terminationInfo: employee.terminationInfo || "",
        educationHistory: employee.educationHistory || employee.resumeHistory || "",
        careerHistory: employee.careerHistory || "",
        standardHours: Number(employee.standardHours || 6),
        paidLeaveTotal: Number(employee.paidLeaveTotal || 0),
        paidLeaveUsed: Number(employee.paidLeaveUsed || 0),
        transportAllowance: Number(employee.transportAllowance || 0),
        socialInsurance: Number(employee.socialInsurance || 0),
        pensionDeduction: Number(employee.pensionDeduction || 0),
        careInsuranceDeduction: Number(employee.careInsuranceDeduction || 0),
        employmentInsuranceDeduction: Number(employee.employmentInsuranceDeduction || 0),
        incomeTax: Number(employee.incomeTax || 0),
        residentTax: Number(employee.residentTax || 0),
        childCareSupport: Number(employee.childCareSupport || 0),
        memo: employee.memo || "",
        rosterRemarks: employee.rosterRemarks || ""
      }));
      return {
        employees,
        shifts: (raw.shifts || []).map((shift) => ({
          id: shift.id || crypto.randomUUID(),
          employeeId: shift.employeeId,
          date: shift.date,
          start: shift.start,
          end: shift.end || "",
          memo: shift.memo || ""
        })),
        payrollExtras: raw.payrollExtras || {},
        schedules: (raw.schedules || []).map((schedule) => ({
          id: schedule.id || crypto.randomUUID(),
          date: schedule.date || todayText(),
          time: schedule.time || "",
          employeeId: schedule.employeeId || "all",
          title: schedule.title || "",
          memo: schedule.memo || "",
          done: Boolean(schedule.done)
        }))

    }

    function setupCloudClient() {
      if (!cloudConfigReady()) {
        cloudMode = false;
        return false;
      }
      try {
        cloudClient = window.supabase.createClient(
          window.ROCO_CLOUD_CONFIG.supabaseUrl,
          window.ROCO_CLOUD_CONFIG.supabaseAnonKey
        );
        cloudMode = true;
        return true;
      } catch {

    async function ensureCloudLogin() {
      if (!setupCloudClient()) return true;
      try {
        const { data } = await cloudClient.auth.getSession();
        if (data.session) {
          if (loginScreen) loginScreen.hidden = true;
          if (logoutButton) logoutButton.hidden = false;
          return true;
        }
        if (loginScreen) loginScreen.hidden = false;
        updateCloudStatus("ログイン待ち");
        return false;
      } catch {
        cloudMode = false;
        updateCloudStatus("端末保存");
        return true;
      }
    }

    async function loginToCloud(event) {
      event.preventDefault();
      if (!cloudClient && !setupCloudClient()) return;
      if (loginMessage) loginMessage.textContent = "ログイン中です";
      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;
      const { error } = await cloudClient.auth.signInWithPassword({ email, password });
      if (error) {
        if (loginMessage) loginMessage.textContent = "ログインできませんでした";
        return;
      }
      if (loginScreen) loginScreen.hidden = true;
      if (logoutButton) logoutButton.hidden = false;
      if (loginMessage) loginMessage.textContent = "";
      updateCloudStatus("クラウド同期中");
      await syncFromCloud();
      render();

    function applySharedData(data) {
      if (!data || typeof data !== "object") return;
      if (data.state) {
        state = normalizeState(data.state);
        localStorage.setItem(storageKey, JSON.stringify(state));
      }
      if (data.contractSettings) {
        contractSettings = { ...loadContractSettingsFallback(), ...data.contractSettings };
        localStorage.setItem(contractSettingsKey, JSON.stringify(contractSettings));
        initContractSettingsForm();
      }
    }

    async function syncFromCloud() {
      if (!cloudMode || !cloudClient) return;
      try {
        const { data, error } = await cloudClient
          .from("register_state")
          .select("data")
          .eq("id", cloudStateId)
          .single();
        if (error || !data || !data.data) {
          await saveCloudNow();
          return;
        }
        applySharedData(data.data);
        updateCloudStatus("クラウド同期中");
      } catch {
        updateCloudStatus("通信待ち");
      }
    }

    async function saveCloudNow() {
      if (!cloudMode || !cloudClient) return true;
      try {
        const { error } = await cloudClient
          .from("register_state")
          .upsert({
            id: cloudStateId,
            data: sharedSnapshot(),
            updated_at: new Date().toISOString()
          });
        updateCloudStatus(error ? "通信待ち" : "クラウド同期中");
        return !error;
      } catch {
        updateCloudStatus("通信待ち");
        return false;
      }
    }

      const now = new Date();

    function punch(type) {
      const employee = findEmployee(punchEmployee.value);
      if (!employee) return showPunchNotice("従業員を選んでください。");
      const now = new Date();
      const today = dateKey(now);
      const todayShifts = shiftsForEmployeeDate(employee.id, today);
      const openShift = todayShifts.find((shift) => !shift.end);
      const existingShift = todayShifts[0];
      if (type === "in") {
        if (openShift) return showPunchNotice(`${employee.name} はすでに出勤中です。`);
        if (existingShift) {
          showPunchNotice(`${employee.name} は今日は退勤済みです。訂正ボタンから時間を直してください。`);
          return;
        } else {
          state.shifts.push({ id: crypto.randomUUID(), employeeId: employee.id, date: today, start: now.toISOString(), end: "", memo: "" });
          showPunchNotice(`${employee.name} の出勤を記録しました。`);
        }
      } else {
        const targetShift = openShift || existingShift;
        if (!targetShift) return showPunchNotice(`${employee.name} の出勤記録が見つかりません。`);
        targetShift.end = now.toISOString();
        targetShift.memo = targetShift.memo || (openShift ? "" : "打刻訂正");
        showPunchNotice(openShift ? `${employee.name} の退勤を記録しました。` : `${employee.name} の退勤時刻を訂正しました。`);
      }
      mergeDuplicateShifts(employee.id, today);
      save();
      render();
    }

    function addManualShift() {
      const employee = findEmployee(calendarEmployee.value) || state.employees[0];
      if (!employee) return alert("先に従業員を登録してください。");
      const date = prompt("勤務日を入力してください（例: 2026-05-27）", `${calendarMonth.value || monthKey(new Date())}-01`);
      if (!date) return;
      const start = prompt("出勤時刻を入力してください（例: 09:00）", "09:00");
      if (!start) return;
      const end = prompt("退勤時刻を入力してください（例: 16:00）", "16:00");
      if (!end) return;
      upsertShift(employee.id, date, start, end, "手入力");
      save();
      render();
    }

    function shiftsForEmployeeDate(employeeIdValue, date) {
      return state.shifts
        .filter((shift) => shift.employeeId === employeeIdValue && shift.date === date)
        .sort((a, b) => (a.start || "").localeCompare(b.start || ""));
    }

    function mergeDuplicateShifts(employeeIdValue, date) {
      const sameDay = shiftsForEmployeeDate(employeeIdValue, date);
      if (sameDay.length <= 1) return sameDay[0] || null;
      const keep = sameDay[0];
      sameDay.slice(1).forEach((shift) => {
        if (!keep.end && shift.end) keep.end = shift.end;
        if (shift.start && new Date(shift.start) < new Date(keep.start)) keep.start = shift.start;
        if (shift.end && keep.end && new Date(shift.end) > new Date(keep.end)) keep.end = shift.end;
        if (shift.memo && !String(keep.memo || "").includes(shift.memo)) {
          keep.memo = [keep.memo, shift.memo].filter(Boolean).join(" / ");
        }
      });
      state.shifts = state.shifts.filter((shift) => shift === keep || shift.employeeId !== employeeIdValue || shift.date !== date);
      keep.memo = keep.memo || "重複整理";
      return keep;
    }

    function mergeDuplicateShiftsForDate(date) {
      const employeeIds = [...new Set(state.shifts.filter((shift) => shift.date === date).map((shift) => shift.employeeId))];
      let changed = false;
      employeeIds.forEach((employeeIdValue) => {
        const before = state.shifts.length;
        mergeDuplicateShifts(employeeIdValue, date);
        if (state.shifts.length !== before) changed = true;
      });
      return changed;
    }

    function upsertShift(employeeIdValue, date, start, end, memo = "手入力") {
      const existing = mergeDuplicateShifts(employeeIdValue, date);
      const next = existing || {
        id: crypto.randomUUID(),
        employeeId: employeeIdValue,
        date,
        start: "",
        end: "",
        memo
      };
      next.start = localDateTime(date, start).toISOString();
      next.end = end ? localDateTime(date, end).toISOString() : "";
      next.memo = existing ? "勤務時間訂正" : memo;
      if (!existing) state.shifts.push(next);
      return next;
    }

    function editShift(shiftId) {
      const shift = state.shifts.find((item) => item.id === shiftId);
      if (!shift) return alert("勤務記録が見つかりません。");
      const employee = findEmployee(shift.employeeId);
      const date = prompt("勤務日を訂正してください（例: 2026-05-27）", shift.date);
      if (!date) return;
      const start = prompt("出勤時刻を訂正してください（例: 09:00）", formatTime(shift.start));
      if (!start) return;
      const end = prompt("退勤時刻を訂正してください（例: 16:00）", shift.end ? formatTime(shift.end) : "");
      const deleteOld = date !== shift.date || shift.employeeId !== employee?.id;
      if (deleteOld) state.shifts = state.shifts.filter((item) => item.id !== shift.id);
      upsertShift(shift.employeeId, date, start, end, "勤務時間訂正");
      save();
      render();
      showPunchNotice(`${employee?.name || "従業員"} の勤務時間を訂正しました。`);
    }

    function deleteShift(shiftId) {
      const shift = state.shifts.find((item) => item.id === shiftId);
      if (!shift) return alert("勤務記録が見つかりません。");
      const employee = findEmployee(shift.employeeId);
      const label = `${employee?.name || "従業員"} ${shift.date} ${formatTime(shift.start)}-${shift.end ? formatTime(shift.end) : "未退勤"}`;
      if (!confirm(`${label} の打刻を削除しますか？`)) return;
      state.shifts = state.shifts.filter((item) => item.id !== shiftId);
      save();
      render();
      showPunchNotice(`${employee?.name || "従業員"} の打刻を削除しました。`);
    }

    function saveEmployee() {
      const name = employeeName.value.trim();
      const wage = Number(hourlyWage.value);
      if (!name || !Number.isFinite(wage)) return showEmployeeNotice("氏名と時給を確認してください。");
      updatePaidLeaveAuto();
      const next = {
        id: employeeId.value || crypto.randomUUID(),
        name,
        furigana: furigana.value.trim(),

    function handleEmployeePhoto(event) {

      const reader = new FileReader();
      reader.onload = () => {
        pendingPhoto = String(reader.result || "");
        showEmployeeNotice("写真を読み込みました。保存すると反映されます。");
      };
      reader.readAsDataURL(file);

    function updatePaidLeaveAuto() {
      paidLeaveTotal.value = legalPaidLeaveDays(hireDate.value || todayText());
    }

    function payExtraKey(employeeId, month) {
      return `${employeeId}_${month}`;
    }

    function currentPayExtras(employee, month) {
      const saved = state.payrollExtras?.[payExtraKey(employee.id, month)] || {};
      return {
        overtimeHours: Number(overtimeHours.value || saved.overtimeHours || 0),
        holidayHours: Number(holidayHours.value || saved.holidayHours || 0),
        nightHours: Number(nightHours.value || saved.nightHours || 0),
        monthlyPaidLeaveDays: Number(monthlyPaidLeaveDays.value || saved.monthlyPaidLeaveDays || 0),
        paidLeaveDates: paidLeaveDates.value.trim() || saved.paidLeaveDates || ""
      };
    }

    function loadPayExtrasForm() {
      const employee = findEmployee(payslipEmployee.value) || state.employees[0];
      if (!employee) {
        overtimeHours.value = "";
        holidayHours.value = "";
        nightHours.value = "";
        return;
      }
      const month = payslipMonth.value || monthKey(new Date());
      const saved = state.payrollExtras?.[payExtraKey(employee.id, month)] || {};
      overtimeHours.value = saved.overtimeHours || "";
      holidayHours.value = saved.holidayHours || "";
      nightHours.value = saved.nightHours || "";
      monthlyPaidLeaveDays.value = saved.monthlyPaidLeaveDays || "";
      paidLeaveDates.value = saved.paidLeaveDates || "";
    }

    function savePayExtras() {
      const employee = findEmployee(payslipEmployee.value) || state.employees[0];
      if (!employee) return;
      const month = payslipMonth.value || monthKey(new Date());
      state.payrollExtras = state.payrollExtras || {};
      state.payrollExtras[payExtraKey(employee.id, month)] = {
        overtimeHours: Number(overtimeHours.value || 0),
        holidayHours: Number(holidayHours.value || 0),
        nightHours: Number(nightHours.value || 0),
        monthlyPaidLeaveDays: Number(monthlyPaidLeaveDays.value || 0),
        paidLeaveDates: paidLeaveDates.value.trim()
      };
      save();
      renderPayslip();
      renderMonthly();

    function renderEmployeeOptions() {
      const options = state.employees.map((employee) => `<option value="${employee.id}">${escapeHtml(employee.name)}</option>`).join("");
      syncSelect(punchEmployee, options);
      syncSelect(scheduleEmployee, `<option value="all">全員</option>${options}`);
      syncSelect(calendarEmployee, `<option value="all">すべて</option>${options}`);
      syncSelect(rosterEmployee, options);
      syncSelect(contractEmployee, options);
      syncSelect(payslipEmployee, options);
    }

    function syncSelect(select, html) {
      const current = select.value;
      select.innerHTML = html;
      if ([...select.options].some((option) => option.value === current)) select.value = current;
    }

    function renderTodayPunches() {
      const today = todayText();

      if (!rows.length) {
        todayPunches.innerHTML = `<div class="empty">今日の打刻はまだありません。</div>`;
        return;
      }

        return `

              <button class="icon-btn danger" type="button" title="打刻を削除" data-delete-shift="${shift.id}">削除</button>

    function renderPunchScheduleCalendar() {
      const month = punchScheduleMonth.value || monthKey(new Date());
      const [year, monthNumber] = month.split("-").map(Number);
      const first = new Date(year, monthNumber - 1, 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      const names = ["日", "月", "火", "水", "木", "金", "土"];
      const cells = names.map((name) => `<div class="day-name">${name}</div>`);
      for (let i = 0; i < 42; i++) {
        const day = new Date(start);
        day.setDate(start.getDate() + i);
        const key = dateKeyLocal(day);
        const dayRows = state.schedules
          .filter((schedule) => schedule.date === key)
          .sort((a, b) => (a.time || "99:99").localeCompare(b.time || "99:99"));
        cells.push(`
          <div class="day-card ${day.getMonth() + 1 === monthNumber ? "" : "muted"}">
            <div class="day-number">${day.getDate()}</div>
            ${dayRows.length ? dayRows.map((schedule) => {
              const employee = findEmployee(schedule.employeeId);
              const assignee = schedule.employeeId === "all" ? "全員" : (employee?.name || "削除済み");
              return `<div class="shift-chip ${schedule.done ? "" : "open"}">${escapeHtml(schedule.time || "")} ${escapeHtml(schedule.title)}<br>${escapeHtml(assignee)}</div>`;
            }).join("") : `<span style="color:var(--muted);font-size:12px;">予定なし</span>`}
          </div>
        `);
      }
      punchScheduleCalendar.innerHTML = cells.join("");
    }

    function renderCalendar() {
      const month = calendarMonth.value || monthKey(new Date());
      let mergedMonth = false;
      [...new Set(state.shifts.filter((shift) => shift.date && shift.date.slice(0, 7) === month).map((shift) => `${shift.employeeId}|${shift.date}`))].forEach((key) => {
        const [employeeIdValue, date] = key.split("|");
        const before = state.shifts.length;
        mergeDuplicateShifts(employeeIdValue, date);
        if (state.shifts.length !== before) mergedMonth = true;
      });
      if (mergedMonth) save();
      const rows = state.shifts
        .filter((shift) => shift.date.slice(0, 7) === month)
        .filter((shift) => calendarEmployee.value === "all" || shift.employeeId === calendarEmployee.value);
      const totalHours = rows.reduce((sum, shift) => sum + workHours(shift), 0);
      const openCount = rows.filter((shift) => !shift.end).length;
      calendarSummary.innerHTML = [
        metric("勤務件数", `${rows.length}件`, "green"),
        metric("合計時間", formatHours(totalHours), "blue"),
        metric("出勤中/退勤未入力", `${openCount}件`, openCount ? "red" : "green"),
        metric("出勤者数", `${new Set(rows.map((shift) => shift.employeeId)).size}人`, "amber")
      ].join("");

      const [year, monthNumber] = month.split("-").map(Number);
      const first = new Date(year, monthNumber - 1, 1);
      const start = new Date(first);
      start.setDate(first.getDate() - first.getDay());
      const names = ["日", "月", "火", "水", "木", "金", "土"];
      const cells = names.map((name) => `<div class="day-name">${name}</div>`);
      for (let i = 0; i < 42; i++) {
        const day = new Date(start);
        day.setDate(start.getDate() + i);
        const key = dateKeyLocal(day);
        const dayRows = rows.filter((shift) => shift.date === key);
        cells.push(`
          <div class="day-card ${day.getMonth() + 1 === monthNumber ? "" : "muted"}">
            <div class="day-number">${day.getDate()}</div>
            ${dayRows.length ? dayRows.map((shift) => {
              const employee = findEmployee(shift.employeeId);
              return `<button class="shift-chip ${shift.end ? "" : "open"}" type="button" data-edit-shift="${shift.id}" title="勤務時間を訂正">${escapeHtml(employee?.name || "削除済み")}<br>${formatTime(shift.start)}-${shift.end ? formatTime(shift.end) : "未退勤"}</button>`;
            }).join("") : `<span style="color:var(--muted);font-size:12px;">勤務なし</span>`}
          </div>
        `);
      }
      calendarGrid.innerHTML = cells.join("");
    }

    function payrollForEmployee(employee, month, extraOverride = null) {
      const shifts = state.shifts
        .filter((shift) => shift.employeeId === employee.id && shift.date.slice(0, 7) === month)
        .sort((a, b) => a.date.localeCompare(b.date) || a.start.localeCompare(b.start));
      const hours = shifts.reduce((sum, shift) => sum + workHours(shift), 0);
      const days = new Set(shifts.map((shift) => shift.date)).size;
      const basePay = Math.round(hours * employee.wage);
      const transportAllowance = days > 0 ? Number(employee.transportAllowance || 0) : 0;
      const jobAllowance = Number(employee.jobAllowance || 0);
      const savedExtra = state.payrollExtras?.[payExtraKey(employee.id, month)] || {};
      const extraHours = extraOverride || {
        overtimeHours: Number(savedExtra.overtimeHours || 0),
        holidayHours: Number(savedExtra.holidayHours || 0),
        nightHours: Number(savedExtra.nightHours || 0)
      };
      const premiumRate = Number(employee.wage || 0) * 1.25;
      const extra = {
        overtimeHours: Number(extraHours.overtimeHours || 0),
        holidayHours: Number(extraHours.holidayHours || 0),
        nightHours: Number(extraHours.nightHours || 0),
        monthlyPaidLeaveDays: Number(extraHours.monthlyPaidLeaveDays || 0),
        paidLeaveDates: extraHours.paidLeaveDates || ""
      };
      extra.overtimePay = Math.round(extra.overtimeHours * premiumRate);
      extra.holidayPay = Math.round(extra.holidayHours * premiumRate);
      extra.nightPay = Math.round(extra.nightHours * premiumRate);
      extra.totalPay = extra.overtimePay + extra.holidayPay + extra.nightPay;
      const taxablePay = basePay + jobAllowance + extra.totalPay;
      const grossPay = taxablePay + transportAllowance;
      const employmentInsuranceAuto = calculateEmploymentInsurance(taxablePay + transportAllowance);
      const socialInsuranceTotal = Number(employee.socialInsurance || 0) + Number(employee.pensionDeduction || 0) + Number(employee.careInsuranceDeduction || 0) + employmentInsuranceAuto;
      const incomeTaxAuto = calculateEstimatedIncomeTax(taxablePay - socialInsuranceTotal);
      const childCareSupportAuto = calculateChildCareSupport(grossPay, month);
      const deductions = {
        socialInsurance: Number(employee.socialInsurance || 0),
        pensionDeduction: Number(employee.pensionDeduction || 0),
        careInsuranceDeduction: Number(employee.careInsuranceDeduction || 0),
        employmentInsuranceDeduction: employmentInsuranceAuto,
        incomeTax: incomeTaxAuto,
        residentTax: Number(employee.residentTax || 0),
        childCareSupport: childCareSupportAuto
      };
      const totalDeductions = Object.values(deductions).reduce((sum, value) => sum + value, 0);
      const netPay = grossPay - totalDeductions;
      return { employee, shifts, hours, days, basePay, jobAllowance, extra, transportAllowance, taxablePay, grossPay, deductions, totalDeductions, netPay, totalPay: netPay };
    }

    function findEmployee(id) {

    function paidLeaveRemaining(employee) {
      return Math.max(0, legalPaidLeaveDays(employee.hireDate) - Number(employee.paidLeaveUsed || 0));
    }

    function calculateEmploymentInsurance(wageTotal) {
      return Math.round(Math.max(0, Number(wageTotal || 0)) * 0.005);
    }

    function calculateEstimatedIncomeTax(taxableAfterSocialInsurance) {
      const monthly = Math.max(0, Number(taxableAfterSocialInsurance || 0));
      if (monthly < 88000) return 0;
      return Math.round((monthly - 88000) * 0.03063);
    }

    function calculateChildCareSupport(grossPay, month) {
      if (month && month < "2026-04") return 0;
      return Math.round(Math.max(0, Number(grossPay || 0)) * 0.00115);
    }

    function legalPaidLeaveDays(hireDateValue) {
      if (!hireDateValue) return 0;
      const hire = new Date(`${hireDateValue}T00:00:00`);
      const today = new Date();
      const months = (today.getFullYear() - hire.getFullYear()) * 12 + (today.getMonth() - hire.getMonth()) - (today.getDate() < hire.getDate() ? 1 : 0);
      if (months < 6) return 0;
      if (months < 18) return 10;
      if (months < 30) return 11;
      if (months < 42) return 12;
      if (months < 54) return 14;
      if (months < 66) return 16;
      if (months < 78) return 18;
      return 20;
    }

    function workHours(shift) {
      if (!shift.end) return 0;

    function monthKey(date) {
      const value = date instanceof Date ? dateKeyLocal(date) : String(date);
      return value.slice(0, 7);

    function dateKey(date) {
      return dateKeyLocal(date);

    function dateKeyLocal(date) {
      const year = date.getFullYear();
      const month = String(date.getMonth() + 1).padStart(2, "0");
      const day = String(date.getDate()).padStart(2, "0");
      return `${year}-${month}-${day}`;

    function formatDateJa(value) {
      if (!value) return "";

      if (!year || !month || !day) return value;
      return `${year}年${Number(month)}月${Number(day)}日`;

      return "\ufeff" + rows.map((row) => row.map((value) => `"${String(value ?? "").replaceAll('"', '""')}"`).join(",")).join("\n");
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = filename;
      anchor.click();
      URL.revokeObjectURL(url);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
